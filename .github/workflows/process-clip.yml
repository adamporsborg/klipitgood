name: Process Clip Job

# Triggered by a Supabase webhook via repository_dispatch
# when a new project row is inserted with status = 'queued'
on:
  repository_dispatch:
    types: [clip_job_queued]
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Supabase project ID to process'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation python3-pip
          pip3 install --quiet Pillow

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Process clip job
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          KLIPITGOOD_ENGINE_ROOT: ${{ github.workspace }}
          NODE_ENV: production
        run: |
          PROJECT_ID="${{ github.event.client_payload.project_id || inputs.project_id }}"
          if [ -n "$PROJECT_ID" ]; then
            node worker/klipitgood-worker.mjs --project "$PROJECT_ID"
          else
            node worker/klipitgood-worker.mjs --once
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-logs-${{ github.run_id }}
          path: output/
          retention-days: 3
