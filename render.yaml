services:
  - type: web
    name: klipitgood
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: KlipItGood <hello@klipitgood.com>
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: KLIPITGOOD_WORKER_SECRET
        generateValue: true
      - key: KLIPITGOOD_AUTO_RUN
        value: "false"
